# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # 386 and arm are 32-bit; amd64 and arm64 are 64-bit
        goarch: [amd64, 386, arm, arm64]
        goos: [linux, windows, darwin]
        name: [widows-latest, ubuntu-latest, macos-latest]
        go:
          - '1.26.1' # minimum version
          - 'oldstable'
          - 'stable'
        exclude:
          # Exclude goos from names of OS images
          - goos: linux
            name: macos-latest
          - goos: windows
            name: macos-latest
          - goos: darwin
            name: ubuntu-latest
          - goos: windows
            name: ubuntu-latest
    runs-on: ${{ matrix.name }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go }}

    - name: Build
      run: |
        go get ./...
        go install .
        go build -v ./...
      env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

    - name: Test
      run: |
        go test -v ./...
      env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

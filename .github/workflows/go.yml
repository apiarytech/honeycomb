# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # Define specific supported pairs to avoid invalid combinations
        include:
          - {os: linux,   arch: amd64, name: ubuntu-latest}
          - {os: linux,   arch: arm64,   name: ubuntu-latest}
          - {os: linux,   arch: 386,   name: ubuntu-latest}
          - {os: windows, arch: amd64, name: windows-latest}
          - {os: windows, arch: arm64,   name: windows-latest}
          - {os: windows, arch: 386,   name: windows-latest}
          - {os: darwin,  arch: amd64, name: macos-latest}
          - {os: darwin,  arch: arm64, name: macos-latest}
          - {os: darwin,  arch: 386, name: macos-latest}
        go:
          - '1.26.1' # minimum version
          - 'oldstable'
          - 'stable'
    runs-on: ${{ matrix.name }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go }}

    - name: Build
      run: |
        go get ./...
        go install .
        go build -v ./...
      env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}

    - name: Test
      env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
      run: go test -v ./...

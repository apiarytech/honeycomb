# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        goarch:
          - amd
          - amd64
          - arm
          - arm64
          - riscv
          - riscv64
          - wasm
          - wasm32
          - wasm64
          - 386
        goos:
          - linux
          - darwin
          - windows
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        go:
          - '1.26.1' # minimum version
          - 'oldstable'
          - 'stable'
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go }}

    - name: Build
      run: |
        go get ./...
        go install .
        go build -v ./...
      env:
          GOARCH: ${{ matrix.goarch }}

    - name: Test
      env:
          GOARCH: ${{ matrix.goarch }}
      run: go test -v ./...

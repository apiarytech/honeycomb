name: Feature Request
description: Suggest a new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to Honeycomb!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the feature
      placeholder: "It would be helpful if..."
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Real-world scenario where this feature helps
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Your idea for implementation
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've considered